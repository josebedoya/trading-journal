# Infra de desarrollo local (reemplaza el stack de Supabase).
# - postgres: se añade en la fase de migración de DB.
# - minio: almacenamiento S3-compatible para dev (en la nube: Cloudflare R2).
services:
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000" # API S3
      - "9001:9001" # consola web
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  minio_data:
